<mat-sidenav-container class="sidenav-container">
  <mat-sidenav #drawer class="sidenav" mode="over" position="start">
    <app-sidenav-menu (navigate)="drawer.close()" />
  </mat-sidenav>
  <mat-sidenav-content>
    <app-header (menuToggle)="drawer.toggle()" />
    <main>
      <app-me />
      <section class="sections">
        <app-about />
        @defer (on viewport) {
          <app-skills />
        } @placeholder {
          <section style="min-height: 50vh"></section>
        }
      </section>
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
