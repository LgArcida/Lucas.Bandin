<mat-sidenav-container class="sidenav-container">
  <mat-sidenav
    #drawer
    class="sidenav"
    mode="over"
    position="start"
  >
    <mat-nav-list>
      <button mat-list-item>Me</button>
      <button mat-list-item>About</button>
      <button mat-list-item>Projects</button>
      <button mat-list-item>Contact</button>
    </mat-nav-list>
  </mat-sidenav>
  <mat-sidenav-content>
    <mat-toolbar color="primary">
      <button
        mat-icon-button
        aria-label="Toggle navigation menu"
        (click)="drawer.toggle()"
        class="menu-button"
      >
        <mat-icon>menu</mat-icon>
      </button>
      <span class="brand-name">Lucas Bandin</span>
      <span class="spacer"></span>
      <nav class="desktop-nav">
        <button mat-button>Me</button>
        <button mat-button>About</button>
        <button mat-button>Projects</button>
        <button mat-button>Contact</button>
      </nav>
    </mat-toolbar>
    <main>
      <router-outlet />
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
