<mat-sidenav-container class="sidenav-container">
  <mat-sidenav #drawer class="sidenav" mode="over" position="start">
    <app-sidenav-menu (navigate)="drawer.close()" />
  </mat-sidenav>
  <mat-sidenav-content>
    <app-header (menuToggle)="drawer.toggle()" />
    <main>
      <app-me />
      <section class="sections">
        <app-about />
        <app-skills />
      </section>
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
