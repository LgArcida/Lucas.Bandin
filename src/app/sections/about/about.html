<section class="about">
  <mat-expansion-panel #panel [class.wide]="isWide()" hideToggle>
    <mat-expansion-panel-header>
      <mat-panel-title>{{ 'ABOUT.TITLE' | translate }}</mat-panel-title>
      <div class="click-overlay" (click)="handleClick($event)"></div>
    </mat-expansion-panel-header>
    <div class="content">
      <div class="image">
        <img
          ngSrc="assets/job.jpeg"
          width="1600"
          height="1201"
          alt="Lucas Bandin working at his desk"
        />
      </div>
      <div class="about__text">
        <p>{{ 'ABOUT.PROBLEM_SOLVING' | translate }}</p>
        <p>{{ 'ABOUT.RIGHT_ANSWER' | translate }}</p>
        <p>{{ 'ABOUT.EXPERIENCE' | translate }}</p>
        <p>
          <mark>{{ 'ABOUT.CLEAN_ARCH' | translate }}</mark>
        </p>
        <p>{{ 'ABOUT.LEARNING' | translate }}</p>
      </div>
    </div>
  </mat-expansion-panel>
</section>
