<section class="skills">
  <app-expandable-panel>
    <span header>{{ 'SKILLS.TITLE' | translate }}</span>
    <mat-tab-group (selectedIndexChange)="selectedTab.set($event)">
      <mat-tab [label]="'SKILLS.LIST' | translate">
        <app-skill-list />
      </mat-tab>
      <mat-tab [label]="'SKILLS.CHART' | translate">
        @if (selectedTab() === 1) {
          <app-skill-bubble-chart />
        }
      </mat-tab>
    </mat-tab-group>
  </app-expandable-panel>
</section>
